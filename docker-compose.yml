services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-velo}
      POSTGRES_USER: ${POSTGRES_USER:-velo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-velo}
    ports:
      - '${POSTGRES_HOST_PORT:-5435}:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-velo} -d ${POSTGRES_DB:-velo}']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - '${REDIS_HOST_PORT:-6382}:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:RELEASE.2025-02-18T16-25-55Z
    command: server /data --console-address ':9001'
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    ports:
      - '${MINIO_API_HOST_PORT:-9004}:9000'
      - '${MINIO_CONSOLE_HOST_PORT:-9005}:9001'
    volumes:
      - minio-data:/data

  minio-create-bucket:
    image: minio/mc:RELEASE.2025-02-15T10-36-16Z
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until /usr/bin/mc alias set local http://minio:9000 ${MINIO_ACCESS_KEY:-minioadmin} ${MINIO_SECRET_KEY:-minioadmin}; do sleep 1; done &&
      /usr/bin/mc mb --ignore-existing local/${MINIO_BUCKET:-velo} &&
      /usr/bin/mc anonymous set download local/${MINIO_BUCKET:-velo}
      "

  backend:
    build:
      context: ./backend
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-create-bucket:
        condition: service_completed_successfully
    environment:
      PORT: ${PORT:-3000}
      APP_URL: ${APP_URL:-http://localhost:3002}
      DATABASE_URL: ${DATABASE_URL:-postgresql://velo:velo@postgres:5432/velo?schema=public}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-velo_access_secret}
      JWT_ACCESS_EXPIRES_IN: ${JWT_ACCESS_EXPIRES_IN:-15m}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-velo_refresh_secret}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      PLATFORM_FEE_RATE: ${PLATFORM_FEE_RATE:-0.12}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      CACHE_TTL_SECONDS: ${CACHE_TTL_SECONDS:-300}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-minio}
      MINIO_PORT: ${MINIO_PORT:-9000}
      MINIO_USE_SSL: ${MINIO_USE_SSL:-false}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_BUCKET: ${MINIO_BUCKET:-velo}
      MINIO_PUBLIC_URL: ${MINIO_PUBLIC_URL:-http://localhost:9004/velo}
    ports:
      - '${BACKEND_HOST_PORT:-3002}:3000'

  frontend:
    build:
      context: ./frontend
      args:
        FRONTEND_API_BASE_URL: ${FRONTEND_API_BASE_URL:-http://localhost:3002/api/v1}
        FRONTEND_WS_BASE_URL: ${FRONTEND_WS_BASE_URL:-http://localhost:3002}
        FRONTEND_CLIENT_LOGGING_ENABLED: ${FRONTEND_CLIENT_LOGGING_ENABLED:-true}
    depends_on:
      - backend
    ports:
      - '${FRONTEND_HOST_PORT:-4202}:80'

volumes:
  postgres-data:
  minio-data:
