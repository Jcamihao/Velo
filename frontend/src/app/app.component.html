<div class="app-shell" [class.with-bottom-nav]="showBottomNav()">
  <router-outlet></router-outlet>
</div>

<div class="menu-overlay" *ngIf="showBottomNav() && menuOpen">
  <button type="button" class="menu-overlay__backdrop" (click)="closeMenu()" aria-label="Fechar menu"></button>

  <aside class="menu-drawer">
    <header class="menu-drawer__header">
      <div class="menu-drawer__identity">
        <ng-container *ngIf="authService.currentUser()?.profile?.avatarUrl; else menuAvatarFallback">
          <img
            class="menu-drawer__avatar"
            [src]="authService.currentUser()?.profile?.avatarUrl"
            [alt]="menuAvatarAlt"
          />
        </ng-container>

        <ng-template #menuAvatarFallback>
          <div class="menu-drawer__avatar menu-drawer__avatar--fallback" aria-hidden="true">
            {{ menuAvatarInitials }}
          </div>
        </ng-template>

        <div>
          <span class="menu-drawer__eyebrow">Menu</span>
          <h2>{{ authService.currentUser()?.profile?.fullName || 'Velo' }}</h2>
          <p>
            {{
              authService.currentUser()?.email ||
              'Entre para acessar perfil, reservas, favoritos e seus anúncios.'
            }}
          </p>
        </div>
      </div>

      <button type="button" class="menu-drawer__close material-icons" (click)="closeMenu()" aria-label="Fechar menu">
        close
      </button>
    </header>

    <nav class="menu-drawer__nav">
      <button type="button" class="menu-link" *ngIf="isOwnerSession" (click)="openOwnerDashboard()">
        <span class="material-icons" aria-hidden="true">dashboard</span>
        <div>
          <strong>Dashboard</strong>
          <small>Faturamento, agenda e pedidos</small>
        </div>
      </button>

      <button type="button" class="menu-link" (click)="openProfile()">
        <span class="material-icons" aria-hidden="true">person</span>
        <div>
          <strong>Perfil</strong>
          <small>Dados da conta e notificações</small>
        </div>
      </button>

      <button type="button" class="menu-link" (click)="openBookings()">
        <span class="material-icons" aria-hidden="true">event_available</span>
        <div>
          <strong>Minhas reservas</strong>
          <small>Histórico, pagamento e status</small>
        </div>
      </button>

      <button type="button" class="menu-link" (click)="openMyAds()">
        <span class="material-icons" aria-hidden="true">directions_car</span>
        <div>
          <strong>Meus anúncios</strong>
          <small>Publicar, editar e acompanhar pedidos</small>
        </div>
      </button>

      <button type="button" class="menu-link" (click)="openFavorites()">
        <span class="material-icons" aria-hidden="true">favorite_border</span>
        <div>
          <strong>Favoritos</strong>
          <small>Seus carros salvos vão aparecer aqui</small>
        </div>
      </button>

    </nav>

    <div class="menu-drawer__footer" *ngIf="!authService.currentUser()">
      <button type="button" class="btn btn-primary" (click)="goToLogin()">Entrar</button>
    </div>

    <div class="menu-drawer__footer" *ngIf="authService.currentUser()">
      <button type="button" class="btn btn-secondary" (click)="authService.logout()">Sair</button>
    </div>
  </aside>
</div>

<app-bottom-nav *ngIf="showBottomNav()" [menuOpen]="menuOpen" (menuToggle)="toggleMenu()"></app-bottom-nav>
