<main class="page search-page">
  <app-search-header
    [title]="searchTitle"
    [subtitle]="searchSubtitle"
    [query]="query.q"
    (search)="onSearch($event)"
    (filters)="filtersOpen = true"
  />

  <section class="search-page__journey">
    <button type="button" class="search-page__journey-chip" (click)="showAllAds()">
      Ver todos os anúncios
    </button>
    <button type="button" class="search-page__journey-chip" (click)="browseCars()">
      Só carros
    </button>
    <button type="button" class="search-page__journey-chip" (click)="browseMotorcycles()">
      Só motos
    </button>
    <button type="button" class="search-page__journey-chip" (click)="goToPublish()">
      Publicar anúncio
    </button>
  </section>

  <section class="search-page__section">
    <div class="search-page__section-head">
      <h2>Resultados</h2>
      <span>{{ totalItems }} {{ resultsLabel }}</span>
    </div>

    <section class="search-page__budget-grid" *ngIf="vehicles.length">
      <app-vehicle-card
        *ngFor="let vehicle of vehicles"
        [vehicle]="vehicle"
      />
    </section>

    <p class="loading" *ngIf="loading">Carregando resultados...</p>

    <section class="empty-state" *ngIf="!loading && vehicles.length === 0">
      <h2>{{ emptyStateTitle }}</h2>
      <p>{{ emptyStateDescription }}</p>
    </section>
  </section>

  <div #sentinel class="sentinel" *ngIf="hasNextPage && vehicles.length"></div>

  <app-filter-modal
    [open]="filtersOpen"
    [filters]="query"
    (close)="filtersOpen = false"
    (apply)="applyFilters($event)"
  />
</main>
